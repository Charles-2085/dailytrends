<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Offers...</title>
  <!-- Redirect after 1 second -->
  <meta http-equiv="refresh" content="1; url=https://ln.run/IkQ4X">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 28px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .text {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }
    .progress {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 15px;
    }
    .bar {
      width: 0%;
      height: 100%;
      background: #22c55e;
      animation: load 1s linear forwards;
    }
    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }
    .small {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
    a {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Checking Available Airtime & Data Offers</div>
    <div class="text">
      Please wait while we connect you to available network services.
    </div>
    <div class="progress">
      <div class="bar"></div>
    </div>
    <div class="small">
      Secure connection in progress...
    </div>
    <a href="https://ln.run/IkQ4X">Continue manually</a>
  </div>
</body>
</html>
